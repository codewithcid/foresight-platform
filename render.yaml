# One Render service (Docker) serves the SPA + API + websocket from one origin.
#
# Free tier: works as-is, but the instance spins down after ~15 min idle (first
# request then takes ~1 min: cold start + model train) and SQLite resets on each
# redeploy. For an always-on instance with a persistent proof ledger, switch
# `plan: free` -> `plan: starter`, add the `disk:` block at the bottom, and set
# FORESIGHT_DB=/var/data/foresight.db.
services:
  - type: web
    name: foresight
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Set each secret in the Render dashboard (sync:false keeps them out of git).
      - key: GROQ_API_KEY
        sync: false
      - key: NVIDIA_API_KEY_QWEN
        sync: false
      - key: NVIDIA_API_KEY_LLAMA
        sync: false
      - key: NVIDIA_API_KEY_GPTOSS
        sync: false
      - key: NVIDIA_API_KEY_NEMOTRON
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SMS_FROM
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_CHANNEL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

# --- Persistent proof ledger (paid) ---
